name: better_lamps_inventory
description: "A new Flutter web project."

publish_to: 'none'
version: 1.0.1+2
environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.0
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.19.0
  image_picker: ^1.0.7
  google_fonts: ^6.2.1
  go_router: ^14.0.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: SegoeUI
      fonts:
        - asset: assets/fonts/segoeui.ttf
